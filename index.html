<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Vanilla CIT Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="max-w-xl w-full bg-gray-800 rounded-2xl shadow-2xl p-6 sm:p-8 border border-gray-700">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
                Vanilla CIT Generator
            </h1>
            <p class="text-gray-400 text-sm mt-1">
                Create name-dedicated item textures for Minecraft 1.21.4+ without using mods.
            </p>
        </header>

        <main class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-indigo-300 mb-1 tracking-wider">Base Vanilla Item</label>
                <input id="baseItem" type="text" value="iron_sword" placeholder="e.g., diamond_axe" 
                    class="w-full bg-gray-700/50 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-indigo-300 mb-1 tracking-wider">Anvil Display Name</label>
                <input id="customName" type="text" value="Excalibur" placeholder="e.g., Fire Diamond" 
                    class="w-full bg-gray-700/50 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-indigo-300 mb-1 tracking-wider">Internal Model Name</label>
                <input id="customModel" type="text" value="excalibur_sword" placeholder="e.g., fire_diamond" 
                    class="w-full bg-gray-700/50 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-indigo-300 mb-1 tracking-wider">Upload Item Texture (.png)</label>
                <div class="relative group mt-1">
                    <input id="textureFile" type="file" accept=".png" 
                        class="w-full bg-gray-700/30 border-2 border-dashed border-gray-600 rounded-lg p-4 text-center text-sm text-gray-400 cursor-pointer hover:border-indigo-500 transition file:hidden">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none text-xs text-gray-400" id="fileLabel">
                        Click or drag to upload custom .png texture
                    </div>
                </div>
            </div>

            <button id="generateBtn" 
                class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl transition duration-150 transform hover:-translate-y-0.5 shadow-lg shadow-indigo-600/20">
                Generate & Download Pack (.zip)
            </button>
        </main>

        <footer class="mt-6 pt-4 border-t border-gray-700/50 text-center text-xs text-gray-500">
            Powered by GitHub Pages & Vanilla Itemstates logic.
        </footer>
    </div>

    <script>
        // Update drag/drop file input text dynamically
        const fileInput = document.getElementById('textureFile');
        const fileLabel = document.getElementById('fileLabel');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.textContent = `Selected: ${e.target.files[0].name}`;
                fileLabel.classList.add('text-indigo-400', 'font-semibold');
            }
        });

        // Core compilation and zip downloading logic
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const baseItem = document.getElementById('baseItem').value.trim().toLowerCase();
            const customName = document.getElementById('customName').value.trim();
            const customModel = document.getElementById('customModel').value.trim().toLowerCase();
            const textureFile = fileInput.files[0];

            if (!baseItem || !customName || !customModel) {
                alert('Please fill out all configuration fields.');
                return;
            }

            const zip = new JSZip();

            // 1. pack.mcmeta
            zip.file("pack.mcmeta", JSON.stringify({
                pack: { 
                    pack_format: 57, 
                    description: `Vanilla CIT for "${customName}"` 
                }
            }, null, 2));

            // 2. The Model Selector Rule
            const itemJson = {
                model: {
                    type: "minecraft:select",
                    property: "minecraft:component",
                    component: "minecraft:custom_name",
                    cases: [
                        { 
                            when: customName, 
                            model: { 
                                type: "minecraft:model", 
                                model: `minecraft:item/${customModel}` 
                            } 
                        }
                    ],
                    fallback: { 
                        type: "minecraft:model", 
                        model: `minecraft:item/${baseItem}` 
                    }
                }
            };
            zip.file(`assets/minecraft/items/${baseItem}.json`, JSON.stringify(itemJson, null, 2));

            // 3. Custom Model Pointer
            const modelJson = {
                parent: "minecraft:item/handheld",
                textures: { 
                    layer0: `minecraft:item/${customModel}` 
                }
            };
            zip.file(`assets/minecraft/models/item/${customModel}.json`, JSON.stringify(modelJson, null, 2));

            // 4. Custom Texture Handling
            if (textureFile) {
                zip.file(`assets/minecraft/textures/item/${customModel}.png`, textureFile);
            } else {
                // Fallback: 1x1 base64 transparent pixel if no file is provided
                const base64Blank = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
                zip.file(`assets/minecraft/textures/item/${customModel}.png`, base64Blank, { base64: true });
            }

            // 5. Build execution and browser download trigger
            try {
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `${customModel}_pack.zip`;
                link.click();
                URL.revokeObjectURL(link.href);
            } catch (err) {
                alert('Error compiling zip file: ' + err.message);
            }
        });
    </script>
</body>
</html>
